# fly.toml app configuration file generated for audiocast on 2026-07-20T22:55:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'audiocast'
primary_region = 'gru'

[build]

[env]
  DATA_DIR = '/data'
  COOKIES_FILE = '/data/cookies.txt'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '2gb'